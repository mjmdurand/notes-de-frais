services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ndf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ndfpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ndf_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ndf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1126:1025"
      - "8026:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ndf}:${POSTGRES_PASSWORD:-ndfpassword}@postgres:5432/${POSTGRES_DB:-ndf_db}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-ndf-documents}
      - MINIO_SECURE=false
      - SMTP_MODE=${SMTP_MODE:-plain}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_FROM=${SMTP_FROM:-ndf@company.com}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Notes de Frais}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_OAUTH_TENANT_ID=${SMTP_OAUTH_TENANT_ID:-}
      - SMTP_OAUTH_CLIENT_ID=${SMTP_OAUTH_CLIENT_ID:-}
      - SMTP_OAUTH_CLIENT_SECRET=${SMTP_OAUTH_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-secret-key}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - MINIO_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL:-}
      - DEMO_ACCOUNTS=${DEMO_ACCOUNTS:-true}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@company.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin1234!}
      - ADMIN_FIRST_NAME=${ADMIN_FIRST_NAME:-Admin}
      - ADMIN_LAST_NAME=${ADMIN_LAST_NAME:-Système}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ndf}:${POSTGRES_PASSWORD:-ndfpassword}@postgres:5432/${POSTGRES_DB:-ndf_db}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-ndf-documents}
      - MINIO_SECURE=false
      - SMTP_MODE=${SMTP_MODE:-plain}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_FROM=${SMTP_FROM:-ndf@company.com}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Notes de Frais}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_OAUTH_TENANT_ID=${SMTP_OAUTH_TENANT_ID:-}
      - SMTP_OAUTH_CLIENT_ID=${SMTP_OAUTH_CLIENT_ID:-}
      - SMTP_OAUTH_CLIENT_SECRET=${SMTP_OAUTH_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-secret-key}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - MINIO_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL:-}
      - DEMO_ACCOUNTS=${DEMO_ACCOUNTS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_DEMO_ACCOUNTS: ${DEMO_ACCOUNTS:-true}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
